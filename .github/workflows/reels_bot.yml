name: Auto Post Reels Bot (Reliability 1000%)

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite disparar via API (Google Apps Script) ou manualmente

jobs:
  post_reels:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Iniciar Bot de Reels
        env:
          GDRIVE_JSON_B64: ${{ secrets.GDRIVE_JSON_B64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TZ: America/Sao_Paulo
        run: |
          python main.py
